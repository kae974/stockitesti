<div class="boxes">


<button onclick="choisirBox('Box 1')">

Box 8<br>🟢 Disponible
</button>


</div>




<h2>
Votre demande
</h2>


<form>


<input 
id="boxChoisi"
placeholder="Box choisi"
readonly>



<label>
Date souhaitée de début :
</label>


<input 
type="date"
required>



<select>

<label>
Date souhaitée de fin :
</label>


<input 
type="date"
required>



<select>

<option>
Particulier
</option>

<option>
Professionnel
</option>

</select>



<input
placeholder="Nom"
required>



<input
placeholder="Email"
required>



<input
placeholder="Téléphone">



<textarea placeholder="Votre besoin">
</textarea>



<button type="submit">
Envoyer ma demande
</button>


</form>
